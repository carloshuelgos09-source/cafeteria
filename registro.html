<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Coffee Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/c08c5c0912.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./css/stile.css">
</head>
<body>

<nav class="nav">
    <div class="logo">☕ Coffe</div>

    <div>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="galeria.html">Galeria</a>
        <a href="contacto.html" class="bold">Contactenos</a>
        <a href="carrito.html"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="login.html"><i class="fa-regular fa-user"></i></a>
    </div>
</nav>

<section class="auth">

    <div class="auth-left">
        <div class="auth-card">
            <div class="auth-icon">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            <h2>¡Únete a Coffee Shop!</h2>

            <input type="text" placeholder="Numero de identificacion">

            <div class="grid-2">
                <input type="text" placeholder="Nombre">
                <input type="text" placeholder="Apellidos">
            </div>

            <input type="number" placeholder="Edad" min="1" max="150">
            <input type="email" placeholder="Correo">
            <input type="text" placeholder="Teléfono">

            <div class="grid-2">
                <input type="password" placeholder="Contraseña">
                <input type="password" placeholder="Confirmar contraseña">
            </div>

            <p class="terms">
                Acepto los <span>Términos y condiciones</span> y la
                <span>Política de privacidad</span>
            </p>

            <button class="btn-dark full">Registrarme</button>

        </div>
    </div>

    <div class="auth-right">
        <img src="./img/coffee-hero-section.png" alt="">
    </div>

</section>

</body>
</html>
