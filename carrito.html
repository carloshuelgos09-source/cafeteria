<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe - Contactenos</title>
    <link rel="stylesheet" href="./css/stile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

</head>
<body>

    <header>
        <nav>
            <div class="logo">☕ Coffe</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="galeria.html">Galeria</a></li>
                <li><a href="contacto.html" class="active" style="border-bottom: 2px solid #e79c2a; padding-bottom: 5px;">Contactenos</a></li>
                <li><a href="carrito.html"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li><a href="login.html"><i class="fa-regular fa-circle-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="menu-container">
        <div class="menu-header">
            <h2>CONTACTENOS</h2>
            <div class="underline"></div>
        </div>

        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="contact-info-item">
                    <i class="fa-solid fa-map"></i> <span>123 Camsite avenue, wil, CA 51425</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-envelope"></i> <span>info@coffeshopwebsite.com</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-phone"></i> <span>(123) 4434-4221</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-regular fa-clock"></i> <span>Monday - friday : 9:00 AM 5:00 PM</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-regular fa-clock"></i> <span>Saturday : 10:00 AM 3:00 PM</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-regular fa-clock"></i> <span>Sunday : closed</span>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-globe"></i> <span>www.coffeshopweb.com</span>
                </div>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="YOUR NAME">
                <input type="email" placeholder="YOUR GMAIL">
                <textarea placeholder="YOUR MESSAGE"></textarea>
                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </div>

        <div class="footer-logo">
            El mejor café ☕
        </div>
    </main>

</body>
</html>
