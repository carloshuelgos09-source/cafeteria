<nav class="nav">
    <div class="logo">☕ Coffe</div>

        <a href="index.html">Home</a>

<section class="contacto">
    <h2>CONTACTENOS</h2>
    <div class="line"></div>

    <div class="contacto-container">

        <div class="contact-left">
            <div class="contact-info">
                <p><i class="fa-regular fa-map"></i> Dirección: Calle 123 #45-67</p>
                <p><i class="fa-regular fa-envelope"></i> Correo: info@coffeeshop.com</p>
                <p><i class="fa-solid fa-phone"></i> Teléfono: +57 300 000 0000</p>
                <p>🕐 Lun-Vie: 8:00am - 8:00pm</p>
                <p>🕐 Sábado: 9:00am - 6:00pm</p>
                <p>🕐 Domingo: Cerrado</p>
                <p><i class="fa-solid fa-globe"></i> www.coffeshop.com</p>
            </div>

            <div class="contact-brand">
                <span>El mejor cafe ☕</span>
            </div>
        </div>

        <div class="contact-form">
            <input type="text" placeholder="Tu nombre">
            <input type="email" placeholder="Tu correo">
            <textarea placeholder="Tu mensaje"></textarea>
            <button class="btn-dark">Enviar</button>
        </div>

    </div> 

</section>
