<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffe - Contactenos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./css/stile.css">
</head>
<body>
    <nav class="nav">
        <div class="logo">☕ Coffe</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="galeria.html">Galeria</a>
            <a href="contacto.html" class="active">Contactenos</a>
            <a href="carrito.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="login.html"><i class="fa-regular fa-user"></i></a>
        </div>
    </nav>

    <main class="menu-container">
        <h2>CONTACTENOS</h2>
        <div class="underline"></div>

        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="contact-info-item"><i class="fa-solid fa-map"></i> 123 Camsite avenue, wil, CA 51425</div>
                <div class="contact-info-item"><i class="fa-solid fa-envelope"></i> info@coffeshopwebsite.com</div>
                <div class="contact-info-item"><i class="fa-solid fa-phone"></i> (123) 4434-4221</div>
                <div class="contact-info-item"><i class="fa-regular fa-clock"></i> Lunes - Viernes: 9AM - 5PM</div>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="NOMBRE COMPLETO" required>
                <input type="email" placeholder="CORREO ELECTRÓNICO" required>
                <textarea rows="5" placeholder="MENSAJE" required></textarea>
                <button type="submit" class="btn-enviar">ENVIAR</button>
            </form>
        </div>
    </main>
</body>
</html>
